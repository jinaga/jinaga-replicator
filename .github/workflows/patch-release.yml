name: Patch Release

# workflow_dispatch restricts triggering to users with write access (maintainers/collaborators).
# No additional permission check is needed.
on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # A PAT is required here instead of GITHUB_TOKEN.
          # GitHub intentionally prevents GITHUB_TOKEN-initiated pushes from
          # triggering downstream workflows (e.g. docker-image.yml on tag push)
          # to avoid infinite loops. Using a PAT is recognized as a user action
          # and will trigger the Docker build workflow normally.
          #
          # Create a fine-grained PAT with "Contents: Read and write" on this
          # repository and store it as the RELEASE_PAT repository secret.
          token: ${{ secrets.RELEASE_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        run: npm version patch

      - name: Push commit and tag
        run: git push --follow-tags
