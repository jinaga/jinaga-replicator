name: Docker Build and Push

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  build:

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            platform_tag: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            platform_tag: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      -
        name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          outputs: type=image,name=jinaga/jinaga-replicator,push-by-digest=true,name-canonical=true
      -
        name: Build and push no-security-policies image
        id: build-no-security
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.no-security-policies
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          outputs: type=image,name=jinaga/jinaga-replicator-no-security-policies,push-by-digest=true,name-canonical=true
      -
        name: Export digests
        run: |
          mkdir -p /tmp/digests/main /tmp/digests/no-security
          touch "/tmp/digests/main/${DIGEST_MAIN#sha256:}"
          touch "/tmp/digests/no-security/${DIGEST_NO_SECURITY#sha256:}"
        env:
          DIGEST_MAIN: ${{ steps.build.outputs.digest }}
          DIGEST_NO_SECURITY: ${{ steps.build-no-security.outputs.digest }}
      -
        name: Upload digests
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.platform_tag }}
          path: /tmp/digests/
          if-no-files-found: error
          retention-days: 1

  merge:

    runs-on: ubuntu-latest
    needs: build

    steps:
      -
        name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      -
        name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            jinaga/jinaga-replicator
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      -
        name: Create and push manifest
        working-directory: /tmp/digests/main
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'jinaga/jinaga-replicator@sha256:%s ' *)
      -
        name: Create and push no-security-policies manifest
        working-directory: /tmp/digests/no-security
        run: |
          docker buildx imagetools create \
            -t jinaga/jinaga-replicator-no-security-policies:latest \
            $(printf 'jinaga/jinaga-replicator-no-security-policies@sha256:%s ' *)
